# Couch Suite → TestFlight on every merge to main, via Fastlane + match.
# All five apps ship for tvOS; universal apps (Nine) also ship an iOS build.
# beta_all covers both platforms for every app; per-app dispatch uses beta_app,
# which ships tvOS plus iOS when the app is universal. A dispatch with a
# `platform` input targets a single platform of a single app via the beta lane.
#
# Replaces the legacy scripts/testflight.sh + ephemeral-keychain cert import.
# match(readonly) fetches the shared Apple Distribution cert + per-app tvOS App
# Store profiles from the private couch-suite-certificates repo (read-only SSH
# deploy key); gym archives with manual distribution signing (entitlements bake
# in — no ad-hoc re-sign); pilot uploads. Build number = git commit count × 10
# plus a per-platform offset (iOS +1) so a universal app's platforms never
# collide on one ASC record (monotonic; computed in-CI, never committed back
# → no self-trigger loop).
#
# Secrets required (see TESTFLIGHT.md):
#   COUCH_TEAM_ID, ASC_API_KEY_ID, ASC_API_ISSUER_ID, ASC_API_KEY_P8 (base64 .p8),
#   MATCH_PASSWORD, MATCH_DEPLOY_KEY (read-only SSH deploy key for the certs repo).
# scripts/testflight.sh is retained as a manual fallback but no longer used by CI.
name: TestFlight (Couch Suite)

on:
  push:
    branches: [main]
    paths:
      - 'rabbit-ears/**'
      - 'darkroom/**'
      - 'nine/**'
      - 'blockhead/**'
      - 'cartridge/**'
      - 'couchkit/**'
      - 'fastlane/**'
      - 'Gemfile'
      - '.github/workflows/testflight-tvos.yml'
  workflow_dispatch:
    inputs:
      app:
        description: 'App folder to ship (or "all")'
        type: string
        default: all
      platform:
        description: 'Platform to ship (needs a specific app; "ios" only for universal apps)'
        type: choice
        options: [all, tvos, ios]
        default: all
      validate_only:
        description: 'Build + sign but do NOT upload (dry run)'
        type: boolean
        default: false

# Serialize uploads so concurrent merges can't race on the build number or hit
# an "already exists" rejection. Never cancel an in-flight upload.
concurrency:
  group: testflight-tvos
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  testflight:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && github.repository_owner == 'ngoldbla' }}
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          # The build number is `git rev-list --count HEAD`. A shallow clone would
          # make that 1 every run → duplicate build number → TestFlight rejects it.
          fetch-depth: 0

      - name: Select Xcode 26+ (tvOS 26 SDK)
        run: |
          set -euo pipefail
          XC=""
          for d in /Applications/Xcode_26*.app; do [ -e "$d" ] && XC="$d"; done
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC"; fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Set up Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: bundle install (pins fastlane via Gemfile)
        run: bundle install --jobs 4 --retry 3

      - name: Install read-only deploy key for the certs repo
        env:
          MATCH_DEPLOY_KEY: ${{ secrets.MATCH_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$MATCH_DEPLOY_KEY" > ~/.ssh/couch_certs
          chmod 600 ~/.ssh/couch_certs
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<'SSHCFG'
          Host github.com
            IdentityFile ~/.ssh/couch_certs
            IdentitiesOnly yes
          SSHCFG

      - name: Build, sign, and upload to TestFlight (Fastlane + match)
        env:
          COUCH_TEAM_ID: ${{ secrets.COUCH_TEAM_ID }}
          # The lane's asc_api_key helper reads these names (base64 .p8 in ASC_KEY_P8).
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # macOS profiles + Mac Installer cert are minted and in the match
          # repo; the mac leg of beta_app is live (guard added post-PR #18).
          COUCH_SHIP_MAC: "1"
          # Override the Matchfile's HTTPS default with SSH so the deploy key applies.
          MATCH_GIT_URL: git@github.com:ngoldbla/couch-suite-certificates.git
          # workflow_dispatch inputs via env (never interpolate untrusted input into the shell).
          INPUT_APP: ${{ github.event.inputs.app }}
          INPUT_PLATFORM: ${{ github.event.inputs.platform }}
          INPUT_VALIDATE_ONLY: ${{ github.event.inputs.validate_only }}
        run: |
          set -euo pipefail
          APP="${INPUT_APP:-all}"
          [ -z "$APP" ] && APP=all
          case "$APP" in
            all|rabbit-ears|darkroom|nine|blockhead|cartridge) ;;
            *) echo "Refusing unknown app target: $APP"; exit 1 ;;
          esac
          PLATFORM="${INPUT_PLATFORM:-all}"
          [ -z "$PLATFORM" ] && PLATFORM=all
          case "$PLATFORM" in
            all|tvos|ios) ;;
            *) echo "Refusing unknown platform: $PLATFORM"; exit 1 ;;
          esac
          if [ "$PLATFORM" != "all" ] && [ "$APP" = "all" ]; then
            echo "A specific platform needs a specific app (got app=all platform=$PLATFORM)"; exit 1
          fi
          UPLOAD="upload:true"
          [ "${INPUT_VALIDATE_ONLY:-false}" = "true" ] && UPLOAD="upload:false"

          # setup_ci (in the lane) creates a temp keychain on CI; match installs the
          # cert into it read-only. No manual cert import needed.
          if [ "$APP" = "all" ]; then
            bundle exec fastlane ios beta_all "$UPLOAD"
          elif [ "$PLATFORM" = "all" ]; then
            bundle exec fastlane ios beta_app app:"$APP" "$UPLOAD"
          else
            bundle exec fastlane ios beta app:"$APP" platform:"$PLATFORM" "$UPLOAD"
          fi
