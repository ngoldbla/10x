# Couch Suite (tvOS) → TestFlight on every merge to main.
#
# Wraps the repo's existing, working pipeline (tvos/scripts/testflight.sh):
# XcodeGen generate → unsigned archive → ad-hoc re-sign (preserves iCloud KVS) →
# app-store-connect export/upload. Build number = git commit count (monotonic;
# derived in-CI, never committed back → no self-trigger loop).
#
# Signing: the script archives unsigned and does the real *distribution* signing
# at export via -allowProvisioningUpdates + the App Store Connect API key. That
# export step needs an Apple Distribution cert in the keychain, so we import one
# into an ephemeral keychain in $RUNNER_TEMP and delete it in an always() step.
# The API key manages provisioning profiles (auto, unlimited) — importing an
# existing cert stops Xcode from minting a new distribution cert every run.
#
# Secrets required (set by the maintainer — see the halt checklist / TESTFLIGHT.md):
#   COUCH_TEAM_ID, ASC_API_KEY_ID, ASC_API_ISSUER_ID, ASC_API_KEY_P8 (base64 .p8),
#   APPLE_DISTRIBUTION_CERT_P12 (base64 .p12), APPLE_CERT_PASSWORD, KEYCHAIN_PASSWORD
name: TestFlight (tvOS)

on:
  push:
    branches: [main]
    paths:
      - 'tvos/**'
      - '.github/workflows/testflight-tvos.yml'
  workflow_dispatch:
    inputs:
      app:
        description: 'App folder to ship (or "all")'
        type: string
        default: all
      validate_only:
        description: 'Build + sign + export .ipa but do NOT upload (dry run)'
        type: boolean
        default: false

# Serialize uploads so concurrent merges can't race on the build number or hit
# an "already exists" rejection. Never cancel an in-flight upload.
concurrency:
  group: testflight-tvos
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  testflight:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && github.repository_owner == 'ngoldbla' }}
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          # testflight.sh derives CFBundleVersion from `git rev-list --count HEAD`.
          # A shallow clone would make that 1 on every run → duplicate build number
          # → TestFlight rejects the upload. Full history keeps it monotonic.
          fetch-depth: 0

      - name: Select Xcode 26+ (tvOS 26 SDK)
        run: |
          set -euo pipefail
          XC=""
          for d in /Applications/Xcode_26*.app; do [ -e "$d" ] && XC="$d"; done
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC"; fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import Apple Distribution cert into an ephemeral keychain
        env:
          DIST_CERT_P12: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/couch-testflight.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$DIST_CERT_P12" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          rm -f "$RUNNER_TEMP/dist.p12"
          # Let codesign/xcodebuild use the key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # Add the ephemeral keychain to the search list (keeping the existing ones).
          # Word-splitting is intended: each existing keychain path is a separate arg.
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

      - name: Archive, sign, and upload to TestFlight
        env:
          COUCH_TEAM_ID: ${{ secrets.COUCH_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          # Pass workflow_dispatch inputs via env (never interpolate untrusted
          # input straight into the shell). Empty on push → defaults below.
          INPUT_APP: ${{ github.event.inputs.app }}
          INPUT_VALIDATE_ONLY: ${{ github.event.inputs.validate_only }}
        run: |
          set -euo pipefail
          # Materialize the App Store Connect API key where the script expects it.
          KEY_DIR="$RUNNER_TEMP/asc_keys"
          mkdir -p "$KEY_DIR"
          export ASC_KEY_PATH="$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
          echo "$ASC_API_KEY_P8" | base64 --decode > "$ASC_KEY_PATH"

          APP="${INPUT_APP:-all}"
          [ -z "$APP" ] && APP=all
          # Only the whole suite or one of the five known app folders is allowed.
          case "$APP" in
            all|rabbit-ears|darkroom|nine|blockhead|cartridge) ;;
            *) echo "Refusing unknown app target: $APP"; exit 1 ;;
          esac

          UPLOAD=--upload
          if [ "$INPUT_VALIDATE_ONLY" = 'true' ]; then
            UPLOAD=''   # dry run: export a signed .ipa, no TestFlight build consumed
          fi

          cd tvos
          scripts/testflight.sh "$APP" $UPLOAD

      - name: Clean up API key and ephemeral keychain
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/asc_keys"/*.p8 || true
          security delete-keychain "$RUNNER_TEMP/couch-testflight.keychain-db" || true
