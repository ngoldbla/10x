name: Cartridge
options:
  bundleIdPrefix: com.couchsuite
  deploymentTarget:
    tvOS: "18.0"
packages:
  CouchKit:
    path: ../couchkit
targets:
  Cartridge:
    type: application
    platform: tvOS
    sources:
      - Sources/App
      - Sources/Engine
      - Assets.xcassets
      - path: PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - package: CouchKit
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.couchsuite.cartridge
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        ASSETCATALOG_COMPILER_LAUNCHIMAGE_NAME: "Launch Image"
        CODE_SIGN_STYLE: Automatic
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Cartridge
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: Cartridge turns your photos into game sprites and backdrops. Photos never leave this Apple TV.
