name: Darkroom
options:
  bundleIdPrefix: com.couchsuite
  deploymentTarget:
    tvOS: "18.0"
packages:
  CouchKit:
    path: ../couchkit
targets:
  Darkroom:
    type: application
    platform: tvOS
    sources:
      - Sources/App
      - Sources/Engine
      - Assets.xcassets
      - path: PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - package: CouchKit
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.couchsuite.darkroom
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        ASSETCATALOG_COMPILER_LAUNCHIMAGE_NAME: "Launch Image"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: ${COUCH_TEAM_ID}
        PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.couchsuite.darkroom tvos"
    entitlements:
      path: Darkroom.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Darkroom
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: Darkroom turns your photos into picross puzzles you develop by solving. Photos never leave this Apple TV.
