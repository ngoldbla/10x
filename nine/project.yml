name: Nine
options:
  bundleIdPrefix: com.couchsuite
  deploymentTarget:
    tvOS: "18.0"
    iOS: "18.0"
    macOS: "15.0"
packages:
  CouchKit:
    path: ../couchkit
targets:
  Nine:
    type: application
    # One universal target: the tvOS app, the iOS (iPhone/iPad) app and the
    # native macOS app build from the same sources — RootView picks the
    # remote, touch or keyboard UI per platform, and per-SDK settings below
    # pick icons, entitlements and signing profiles (PRD-4 §1).
    supportedDestinations: [tvOS, iOS, macOS]
    sources:
      - Sources/App
      - Sources/Engine
      - Sources/Shared
      - Assets.xcassets
      - path: PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - package: CouchKit
      # The widget family ships on iOS only; embedding into the tvOS app
      # would break tvOS signing (PRD-3 §5).
      - target: NineWidgets
        embed: true
        destinationFilters: [iOS]
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.couchsuite.nine
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2,3"
        # tvOS keeps the layered brand asset; iOS uses the flat square icon;
        # macOS uses its own margined, rounded icon set (PRD-4 §1).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        "ASSETCATALOG_COMPILER_APPICON_NAME[sdk=appletvos*]": "App Icon & Top Shelf Image"
        "ASSETCATALOG_COMPILER_APPICON_NAME[sdk=appletvsimulator*]": "App Icon & Top Shelf Image"
        "ASSETCATALOG_COMPILER_APPICON_NAME[sdk=macosx*]": "AppIcon-macOS"
        "ASSETCATALOG_COMPILER_LAUNCHIMAGE_NAME[sdk=appletvos*]": "Launch Image"
        "ASSETCATALOG_COMPILER_LAUNCHIMAGE_NAME[sdk=appletvsimulator*]": "Launch Image"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: ${COUCH_TEAM_ID}
        # App Sandbox is mandatory for the Mac App Store; hardened runtime
        # rides with it. tvOS/iOS are unaffected (this key is macOS-scoped by
        # the entitlements override below, not here).
        "ENABLE_HARDENED_RUNTIME[sdk=macosx*]": "YES"
        # match names tvOS profiles with a "tvos" suffix, macOS with "macos";
        # iOS gets the default.
        "PROVISIONING_PROFILE_SPECIFIER[sdk=appletvos*]": "match AppStore com.couchsuite.nine tvos"
        "PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]": "match AppStore com.couchsuite.nine"
        "PROVISIONING_PROFILE_SPECIFIER[sdk=macosx*]": "match AppStore com.couchsuite.nine macos"
        # iOS adds the app group (widget snapshot); the checked-in file keeps
        # the generated tvOS entitlements byte-identical (PRD-3 §3a). macOS
        # gets its own sandbox + KVS + game-center entitlements.
        "CODE_SIGN_ENTITLEMENTS[sdk=iphoneos*]": Nine-iOS.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=iphonesimulator*]": Nine-iOS.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": Nine-macOS.entitlements
    entitlements:
      path: Nine.entitlements
      properties:
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
        # Leaderboards + achievements (Game Center is default-enabled on App
        # IDs, so existing match profiles already carry this entitlement).
        com.apple.developer.game-center: true
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Nine
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        # Required for the Mac App Store (.pkg upload rejects without it, error
        # 90242); harmless/valid on iOS too, ignored by tvOS. Nine is a sudoku.
        LSApplicationCategoryType: public.app-category.puzzle-games
        # PRD-5: an extended gamepad drives the Pad Play session. Declare
        # controller-driven UI support and the ExtendedGamepad profile — but
        # NOT a requires-controller key: the app stays fully remote-playable, so
        # enforcement is session-scoped, never app-wide.
        GCSupportsControllerUserInteraction: true
        # Each entry must be a dict keyed `ProfileName` — any other shape fails
        # App Store validation (error 90593, seen on the first post-merge
        # upload). MicroGamepad = the Siri Remote grammar RemoteKit speaks.
        GCSupportedGameControllers:
          - ProfileName: ExtendedGamepad
          - ProfileName: MicroGamepad
        # Widgets deep-link into today's daily via nine://daily.
        CFBundleURLTypes:
          - CFBundleURLName: com.couchsuite.nine
            CFBundleURLSchemes: [nine]
        # iOS-only keys (ignored by tvOS): no storyboard — an empty modern
        # launch screen inherits the window background. Appearance follows
        # the system (or the in-app Appearance pref) since 1.1.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  # The Home Screen / Lock Screen widget family (PRD-3). iOS only — never in
  # the tvOS dependency graph. Phase 3b compiles the Engine in (real
  # `place()` runs in-process; the CouchKit package is linked for CouchCore)
  # but the widget never runs the generator — extension budget is ~30MB.
  NineWidgets:
    type: app-extension
    supportedDestinations: [iOS]
    deploymentTarget:
      iOS: "18.0"
    sources:
      # xcodegen classifies the .xcprivacy inside Sources/Widgets as a
      # resource automatically.
      - Sources/Widgets
      - Sources/Shared
      - Sources/Engine
    dependencies:
      - package: CouchKit
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.couchsuite.nine.widgets
        # ASC requires the extension's CFBundleShortVersionString to equal
        # the app's; CURRENT_PROJECT_VERSION stays in lockstep via the
        # project-wide xcargs the Fastfile passes.
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: true
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: ${COUCH_TEAM_ID}
        "PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]": "match AppStore com.couchsuite.nine.widgets"
    entitlements:
      path: NineWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.couchsuite.nine
    info:
      path: WidgetsInfo.plist
      properties:
        CFBundleDisplayName: Nine
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
